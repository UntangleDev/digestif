name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Elixir 1.20 / OTP 28
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Elixir and Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: "1.20.2"
          otp-version: "28.5.0.3"
          version-type: strict

      - name: Fetch locked dependencies
        run: mix deps.get --check-locked

      - name: Check for unused dependencies
        run: mix deps.unlock --check-unused

      - name: Check formatting
        run: mix format --check-formatted

      - name: Verify the default build without optional dependencies
        env:
          MIX_ENV: no_optional_deps
        run: |
          mix compile --no-optional-deps --warnings-as-errors
          mix run --no-compile -e 'false = Code.ensure_loaded?(Pbkdf2); hash = Digestif.hash("CI probe"); true = Digestif.verify?("CI probe", hash)'

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Run tests with coverage
        run: mix test --warnings-as-errors --cover

      - name: Audit dependencies
        run: mix deps.audit

      - name: Build documentation
        run: mix docs --warnings-as-errors

      - name: Build Hex package
        run: mix hex.build
